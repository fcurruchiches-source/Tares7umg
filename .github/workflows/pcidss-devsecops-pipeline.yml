# ============================================================
# Pipeline CI/CD con Escaneo de Contenedores y Dependencias
# Cumplimiento PCI-DSS v4.0 — DevSecOps Pipeline
# ============================================================
# Requisitos cubiertos:
#   Req. 5.2  — Protección contra malware en componentes
#   Req. 6.2  — Desarrollo seguro y revisión de código
#   Req. 6.3  — Gestión de vulnerabilidades en dependencias
#   Req. 6.4  — Protección de aplicaciones web y APIs
#   Req. 11.3 — Pruebas de penetración y escaneo de vulnerabilidades
# ============================================================

name: PCI-DSS DevSecOps Pipeline

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]
  schedule:
    # Escaneo completo nocturno (ASV-equivalent)
    - cron: "0 2 * * *"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Umbral de severidad para gate de calidad PCI
  CRITICAL_FAIL_THRESHOLD: "CRITICAL"
  HIGH_FAIL_THRESHOLD: "HIGH"
  # CVSS threshold para bloqueo automático (PCI Req 6.3.3)
  CVSS_BLOCK_SCORE: "7.0"

# ============================================================
# JOBS
# ============================================================
jobs:

  # ----------------------------------------------------------
  # FASE 0: Pre-checks y configuración
  # ----------------------------------------------------------
  setup:
    name: "🔧 Setup & Pre-Checks"
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      short-sha: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Historial completo para análisis de secretos

      - name: Establecer variables de entorno
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}

  # ----------------------------------------------------------
  # FASE 1: Detección de Secretos (PCI Req. 3.3, 8.3)
  # CRÍTICO: Se ejecuta antes que cualquier otra fase
  # ----------------------------------------------------------
  secret-scanning:
    name: "🔐 Secret Scanning"
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "[PCI-3.3] Escaneo de secretos con Gitleaks"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          args: detect --source=. --verbose --redact --exit-code 1

      - name: "[PCI-3.3] Escaneo adicional con TruffleHog"
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: >
            --only-verified
            --results=verified,unknown
            --fail

      - name: Generar reporte de secretos
        if: always()
        run: |
          echo "## Secret Scanning Report — $(date -u)" > secret-report.md
          echo "**Commit:** ${{ needs.setup.outputs.short-sha }}" >> secret-report.md
          echo "**PCI Control:** Req. 3.3 / Req. 8.3" >> secret-report.md

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secret-scan-report
          path: secret-report.md
          retention-days: 90  # PCI Req. 10.7 — retención de logs

  # ----------------------------------------------------------
  # FASE 2: Análisis Estático de Código (SAST) (PCI Req. 6.2.4)
  # ----------------------------------------------------------
  sast:
    name: "🔍 SAST — Análisis Estático"
    runs-on: ubuntu-latest
    needs: secret-scanning
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: "[PCI-6.2.4] CodeQL — Inicializar"
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, python, java
          queries: security-extended, security-and-quality

      - name: "[PCI-6.2.4] CodeQL — Auto Build"
        uses: github/codeql-action/autobuild@v3

      - name: "[PCI-6.2.4] CodeQL — Análisis"
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"
          output: codeql-results

      - name: "[PCI-6.2.4] Semgrep — Reglas OWASP y PCI"
        uses: returntocorp/semgrep-action@v1
        with:
          config: >
            p/owasp-top-ten
            p/cwe-top-25
            p/secrets
            p/injection
          generateSarif: "1"
          publishResults: false
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Cargar resultados SAST al Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ----------------------------------------------------------
  # FASE 3: Análisis de Composición de Software (SCA)
  # PCI Req. 6.3.2 — SBOM, PCI Req. 6.3.3 — Dependencias
  # ----------------------------------------------------------
  dependency-scanning:
    name: "📦 SCA — Dependencias & SBOM"
    runs-on: ubuntu-latest
    needs: secret-scanning
    steps:
      - uses: actions/checkout@v4

      - name: "[PCI-6.3.2] Generar SBOM con Syft"
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom-cyclonedx

      - name: "[PCI-6.3.3] Auditar dependencias npm"
        run: |
          npm audit --audit-level=high --json > npm-audit.json || true
          # Fallar si hay vulnerabilidades CRÍTICAS o ALTAS
          CRITICAL=$(cat npm-audit.json | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(cat npm-audit.json | jq '.metadata.vulnerabilities.high // 0')
          echo "Critical: $CRITICAL | High: $HIGH"
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "❌ PCI-DSS BLOQUEADO: Vulnerabilidades críticas/altas en dependencias npm"
            exit 1
          fi
        continue-on-error: false

      - name: "[PCI-6.3.3] OWASP Dependency-Check"
        uses: dependency-check/Dependency-Check_Action@main
        id: depcheck
        with:
          project: ${{ github.repository }}
          path: "."
          format: "HTML,JSON,SARIF"
          args: >
            --enableRetired
            --enableExperimental
            --failOnCVSS ${{ env.CVSS_BLOCK_SCORE }}
            --suppression suppression.xml
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

      - name: "[PCI-6.3.3] Snyk — Escaneo de dependencias"
        uses: snyk/actions/node@master
        continue-on-error: false
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >
            --severity-threshold=high
            --fail-on=upgradable
            --json-file-output=snyk-results.json

      - name: "[PCI-6.3.3] Verificar SBOM con Grype"
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype sbom:sbom.cdx.json \
            --fail-on ${{ env.CRITICAL_FAIL_THRESHOLD }} \
            -o table \
            -o json=grype-sbom-results.json
          echo "✅ SBOM verificado contra base de datos de vulnerabilidades"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-scan-reports
          path: |
            sbom.cdx.json
            npm-audit.json
            snyk-results.json
            grype-sbom-results.json
            reports/
          retention-days: 90

  # ----------------------------------------------------------
  # FASE 4: Build de Imagen Docker
  # ----------------------------------------------------------
  build:
    name: "🏗️ Build Docker Image"
    runs-on: ubuntu-latest
    needs: [sast, dependency-scanning]
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-ref: ${{ steps.build.outputs.imageid }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login al registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "[PCI-5.2] Build con usuario no-root y no-privileged"
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false  # No push hasta pasar escaneos
          load: true   # Cargar imagen localmente para escaneo
          tags: ${{ needs.setup.outputs.image-tag }}
          # Opciones de seguridad para el build (PCI Req. 5.2)
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Provenance y SBOM del build
          provenance: true
          sbom: true

  # ----------------------------------------------------------
  # FASE 5: Escaneo de Contenedores (PCI Req. 5.2, 6.3.3)
  # FASE MÁS CRÍTICA para ambientes containerizados
  # ----------------------------------------------------------
  container-scanning:
    name: "🐳 Container Security Scanning"
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Login al registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "[PCI-5.2] Trivy — Escaneo completo de imagen"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.setup.outputs.image-tag }}
          format: "sarif"
          output: "trivy-image.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "1"          # Bloquear si CRITICAL/HIGH
          ignore-unfixed: false
          vuln-type: "os,library"
          scanners: "vuln,secret,config,license"
          trivyignores: .trivyignore

      - name: "[PCI-5.2] Trivy — Reporte detallado tabla"
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.setup.outputs.image-tag }}
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          output: "trivy-table-report.txt"

      - name: "[PCI-6.3.3] Grype — Escaneo de vulnerabilidades de imagen"
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype ${{ needs.setup.outputs.image-tag }} \
            --fail-on ${{ env.CRITICAL_FAIL_THRESHOLD }} \
            -o sarif > grype-image.sarif
          grype ${{ needs.setup.outputs.image-tag }} \
            -o json > grype-image-full.json

      - name: "[PCI-6.3.3] Docker Scout — Análisis de capas"
        uses: docker/scout-action@v1
        with:
          command: cves,recommendations
          image: ${{ needs.setup.outputs.image-tag }}
          sarif-file: docker-scout.sarif
          only-severities: critical,high
          exit-code: false  # Solo informativo

      - name: "[PCI-5.2] Anchore — Policy compliance check"
        uses: anchore/scan-action@v3
        id: anchore
        with:
          image: ${{ needs.setup.outputs.image-tag }}
          fail-build: true
          severity-cutoff: high
          output-format: sarif

      - name: "[PCI-2.2] Dockle — Dockerfile best practices"
        run: |
          curl -L -o dockle.deb \
            "https://github.com/goodwithtech/dockle/releases/download/v0.4.14/dockle_0.4.14_Linux-64bit.deb"
          sudo dpkg -i dockle.deb
          dockle \
            --exit-code 1 \
            --exit-level fatal \
            --format json \
            --output dockle-report.json \
            ${{ needs.setup.outputs.image-tag }}

      - name: "[PCI-6.3.2] Syft — SBOM de imagen"
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.setup.outputs.image-tag }}
          format: cyclonedx-json
          artifact-name: sbom-container-image
          output-file: sbom-image.cdx.json

      - name: Cargar SARIFs al Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-image.sarif"
          category: trivy-container

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: container-scan-reports
          path: |
            trivy-table-report.txt
            grype-image-full.json
            dockle-report.json
            sbom-image.cdx.json
          retention-days: 90

  # ----------------------------------------------------------
  # FASE 6: Escaneo de IaC y Configuración (PCI Req. 1.1, 2.2)
  # ----------------------------------------------------------
  iac-scanning:
    name: "⚙️ IaC & Config Scanning"
    runs-on: ubuntu-latest
    needs: secret-scanning
    steps:
      - uses: actions/checkout@v4

      - name: "[PCI-1.1] Checkov — IaC Scanning"
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: dockerfile,kubernetes,terraform,helm
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false
          check: >
            CKV_DOCKER_2,CKV_DOCKER_3,CKV_DOCKER_4,
            CKV_K8S_1,CKV_K8S_6,CKV_K8S_8,CKV_K8S_9,
            CKV_K8S_11,CKV_K8S_14,CKV_K8S_15,CKV_K8S_16,
            CKV_K8S_20,CKV_K8S_21,CKV_K8S_25,CKV_K8S_28,
            CKV_K8S_30,CKV_K8S_32,CKV_K8S_35,CKV_K8S_36,
            CKV_K8S_37,CKV_K8S_38,CKV_K8S_43,CKV_TF_1

      - name: "[PCI-2.2] Hadolint — Lint de Dockerfile"
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          format: sarif
          output-file: hadolint.sarif
          failure-threshold: error
          ignore: DL3008,DL3009

      - name: "[PCI-1.1] KICS — Infraestructura como código"
        uses: checkmarx/kics-github-action@v1.7
        with:
          path: ./
          output_path: kics-results/
          output_formats: "json,sarif"
          ignore_on_exit: results
          enable_comments: false
          queries: >
            Insecure Configurations,
            Encryption,
            Networking and Firewall,
            Secret Management

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: iac-scan-reports
          path: |
            checkov-results.sarif
            hadolint.sarif
            kics-results/
          retention-days: 90

  # ----------------------------------------------------------
  # FASE 7: DAST — Análisis Dinámico (PCI Req. 6.4, 11.3)
  # Solo en push a main/release
  # ----------------------------------------------------------
  dast:
    name: "🌐 DAST — Análisis Dinámico"
    runs-on: ubuntu-latest
    needs: [container-scanning, iac-scanning]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    services:
      app:
        image: ${{ needs.setup.outputs.image-tag }}
        ports:
          - 8080:8080
        env:
          NODE_ENV: test
          DATABASE_URL: sqlite::memory:
    steps:
      - uses: actions/checkout@v4

      - name: Esperar a que la aplicación esté disponible
        run: |
          timeout 60 bash -c 'until curl -s http://localhost:8080/health; do sleep 2; done'

      - name: "[PCI-6.4] OWASP ZAP — Full Scan"
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: "http://localhost:8080"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: >
            -z "-config ajaxSpider.enabled=true"
            -z "-config api.disablekey=true"
          fail_action: true
          allow_issue_writing: true
          artifact_name: zap-dast-report

      - name: "[PCI-11.3] Nuclei — CVE y OWASP Templates"
        run: |
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          nuclei \
            -target http://localhost:8080 \
            -tags owasp,cve,sqli,xss,xxe \
            -severity critical,high \
            -json-export nuclei-results.json \
            -exit-code 1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dast-reports
          path: |
            nuclei-results.json
          retention-days: 90

  # ----------------------------------------------------------
  # FASE 8: PCI Compliance Gate — Decisión Final
  # ----------------------------------------------------------
  pci-compliance-gate:
    name: "✅ PCI-DSS Compliance Gate"
    runs-on: ubuntu-latest
    needs: [secret-scanning, sast, dependency-scanning, container-scanning, iac-scanning]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Descargar todos los reportes
        uses: actions/download-artifact@v4
        with:
          path: all-reports/

      - name: "[PCI GATE] Evaluar estado de cumplimiento"
        id: compliance
        run: |
          FAIL=0
          WARNINGS=0

          # Verificar cada fase
          SECRET_STATUS="${{ needs.secret-scanning.result }}"
          SAST_STATUS="${{ needs.sast.result }}"
          DEP_STATUS="${{ needs.dependency-scanning.result }}"
          CONTAINER_STATUS="${{ needs.container-scanning.result }}"
          IAC_STATUS="${{ needs.iac-scanning.result }}"

          echo "## 🛡️ PCI-DSS v4.0 Compliance Gate Report" > compliance-report.md
          echo "**Pipeline Run:** #${{ github.run_number }}" >> compliance-report.md
          echo "**Commit:** ${{ github.sha }}" >> compliance-report.md
          echo "**Date:** $(date -u)" >> compliance-report.md
          echo "" >> compliance-report.md
          echo "| Control | Fase | Estado | Requisito PCI |" >> compliance-report.md
          echo "|---------|------|--------|---------------|" >> compliance-report.md

          check_status() {
            local name=$1 phase=$2 status=$3 req=$4
            local icon="✅"
            if [ "$status" = "failure" ]; then icon="❌"; FAIL=$((FAIL+1)); fi
            if [ "$status" = "skipped" ]; then icon="⚠️"; WARNINGS=$((WARNINGS+1)); fi
            echo "| $icon $name | $phase | $status | $req |" >> compliance-report.md
          }

          check_status "Secret Scanning" "Gitleaks + TruffleHog" "$SECRET_STATUS" "Req. 3.3, 8.3"
          check_status "SAST" "CodeQL + Semgrep" "$SAST_STATUS" "Req. 6.2.4"
          check_status "SCA / SBOM" "Snyk + OWASP DC + Grype" "$DEP_STATUS" "Req. 6.3.2, 6.3.3"
          check_status "Container Scan" "Trivy + Anchore + Dockle" "$CONTAINER_STATUS" "Req. 5.2, 6.3.3"
          check_status "IaC Scan" "Checkov + KICS" "$IAC_STATUS" "Req. 1.1, 2.2"

          echo "" >> compliance-report.md
          if [ "$FAIL" -gt 0 ]; then
            echo "### ❌ RESULTADO: NO CUMPLE CON PCI-DSS v4.0" >> compliance-report.md
            echo "$FAIL control(s) fallidos. DESPLIEGUE BLOQUEADO." >> compliance-report.md
            echo "pci_status=FAIL" >> $GITHUB_OUTPUT
          else
            echo "### ✅ RESULTADO: CUMPLE CON PCI-DSS v4.0" >> compliance-report.md
            echo "Todos los controles de seguridad superados. Pipeline aprobado." >> compliance-report.md
            echo "pci_status=PASS" >> $GITHUB_OUTPUT
          fi

          cat compliance-report.md
          [ "$FAIL" -gt 0 ] && exit 1 || exit 0

      - name: Crear comentario en PR con resultados
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('compliance-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pci-compliance-gate-report
          path: compliance-report.md
          retention-days: 365  # PCI Req. 10.7 — 1 año de retención

  # ----------------------------------------------------------
  # FASE 9: Push y Firma de Imagen (solo si pasa el gate)
  # PCI Req. 6.3.3 — Integridad de artefactos
  # ----------------------------------------------------------
  publish:
    name: "📤 Publish Signed Image"
    runs-on: ubuntu-latest
    needs: pci-compliance-gate
    if: needs.pci-compliance-gate.result == 'success' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write  # Para Cosign OIDC
    steps:
      - uses: actions/checkout@v4

      - name: Login al registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Cosign
        uses: sigstore/cosign-installer@v3

      - name: Build y Push imagen verificada
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ needs.setup.outputs.image-tag }}
          provenance: true
          sbom: true

      - name: "[PCI-6.3.3] Firmar imagen con Cosign (keyless)"
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}
          echo "✅ Imagen firmada con Sigstore/Cosign — integridad verificable"

      - name: "[PCI-6.3.3] Adjuntar SBOM a la imagen firmada"
        run: |
          cosign attach sbom \
            --sbom sbom-image.cdx.json \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}

      - name: "[PCI-6.3.3] Verificar firma de imagen"
        run: |
          cosign verify \
            --certificate-identity-regexp=".*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}
          echo "✅ Firma verificada correctamente"

# ============================================================
# NOTAS DE CUMPLIMIENTO PCI-DSS v4.0
# ============================================================
# Req. 1.1  → Checkov/KICS verifican configuraciones de red
# Req. 2.2  → Hadolint + Checkov verifican config por defecto
# Req. 3.3  → Gitleaks + TruffleHog detectan secretos/CHD
# Req. 5.2  → Trivy + Anchore escanean malware en contenedores
# Req. 6.2.4 → CodeQL + Semgrep realizan análisis SAST
# Req. 6.3.2 → Syft genera SBOM de código e imagen
# Req. 6.3.3 → Snyk + OWASP DC + Grype + Trivy cubren dependencias
# Req. 6.4.1 → OWASP ZAP cubre análisis DAST de aplicación web
# Req. 8.3  → Secret scanning previene exposición de credenciales
# Req. 10.7 → Artefactos retenidos 90-365 días (audit trail)
# Req. 11.3 → Nuclei realiza pruebas de penetración automatizadas
# ============================================================
